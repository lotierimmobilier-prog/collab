# ─────────────────────────────────────────────────────────────
# À lancer depuis le dossier du repo sur le VPS (/var/www/collab) :
#   docker compose -f docker-compose.vps.yml up -d
# Réutilise le .env existant. Watchtower auto-met à jour l'image.
# ─────────────────────────────────────────────────────────────
services:
  app:
    image: ghcr.io/lotierimmobilier-prog/collab:latest
    container_name: collab
    restart: unless-stopped
    env_file: .env.local            # DATABASE_URL, AUTH_SECRET, ANTHROPIC_API_KEY, NEXT_PUBLIC_GOOGLE_CLIENT_ID
    # Réseau de l'hôte : le conteneur voit la base via localhost (comme l'ancien
    # pm2) et écoute sur :3000 que nginx proxifie déjà. Aucun changement de .env.
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro   # auth GHCR pour images privées
    command: --interval 180 --cleanup --label-enable
