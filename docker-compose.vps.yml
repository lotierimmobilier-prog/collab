# ─────────────────────────────────────────────────────────────
# À lancer depuis le dossier du repo sur le VPS (/var/www/collab) :
#   docker compose -f docker-compose.vps.yml up -d
# Réutilise le .env existant. Watchtower auto-met à jour l'image.
# ─────────────────────────────────────────────────────────────
services:
  app:
    image: ghcr.io/lotierimmobilier-prog/collab:latest
    container_name: collab
    restart: unless-stopped
    env_file: .env.local            # DATABASE_URL, AUTH_SECRET, ANTHROPIC_API_KEY, NEXT_PUBLIC_GOOGLE_CLIENT_ID
    # Force Next.js à écouter sur toutes les interfaces (sinon il se lie au nom
    # d'hôte en réseau host et nginx → 127.0.0.1:3000 ne le joint pas → 502).
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    # Réseau de l'hôte : le conteneur voit la base via localhost (comme l'ancien
    # pm2) et écoute sur :3000 que nginx proxifie déjà. Aucun changement de .env.
    network_mode: host
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    environment:
      # Docker récent (29.x) refuse l'API 1.25 par défaut de Watchtower : on
      # force une version d'API compatible.
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro   # auth GHCR pour images privées
    # Vérifie une nouvelle image toutes les 30 s (au lieu de 180) pour déployer
    # plus vite après un push sur main. Voir docs/deploiement-rapide.md pour un
    # déclenchement instantané (API HTTP de Watchtower depuis GitHub Actions).
    command: --interval 30 --cleanup --label-enable
