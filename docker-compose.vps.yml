# ─────────────────────────────────────────────────────────────
# À placer sur le VPS (ex: /opt/collab/docker-compose.yml).
# Tire l'image construite par GitHub Actions et l'auto-met à jour
# via Watchtower. Lancer :  docker compose up -d
# ─────────────────────────────────────────────────────────────
services:
  app:
    image: ghcr.io/lotierimmobilier-prog/collab:latest
    container_name: collab
    restart: unless-stopped
    env_file: .env            # DATABASE_URL, AUTH_SECRET, ANTHROPIC_API_KEY, NEXT_PUBLIC_GOOGLE_CLIENT_ID
    ports:
      - "127.0.0.1:3000:3000" # exposé en local ; nginx fait le reverse proxy + TLS
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro   # auth GHCR pour images privées
    command: --interval 180 --cleanup --label-enable
