# Configuration Nginx + HTTPS pour Collab — Lotier Immobilier
# Domaine : collab.lotier-immobilier.com
#
# ÉTAPES D'INSTALLATION SUR LE VPS :
# ──────────────────────────────────────────────────────────────
# 1. apt install nginx certbot python3-certbot-nginx -y
# 2. Copier ce fichier dans /etc/nginx/sites-available/collab
# 3. ln -s /etc/nginx/sites-available/collab /etc/nginx/sites-enabled/collab
# 4. rm /etc/nginx/sites-enabled/default  (si présent)
# 5. nginx -t && systemctl reload nginx
# 6. certbot --nginx -d collab.lotier-immobilier.com --email collab@lotier-immobilier.com --agree-tos --no-eff-email
# 7. systemctl enable certbot.timer   (renouvellement auto)
# ──────────────────────────────────────────────────────────────

# ── Paramètres TLS partagés ─────────────────────────────────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;                        # désactiver la réutilisation de session TLS

# TLS 1.2 + 1.3 uniquement (TLS 1.0 / 1.1 supprimés)
ssl_protocols TLSv1.2 TLSv1.3;

# Ciphers forts uniquement (PFS — Perfect Forward Secrecy)
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
ssl_prefer_server_ciphers on;

# OCSP Stapling — validation du certificat côté serveur
ssl_stapling        on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Diffie-Hellman group (générer avec : openssl dhparam -out /etc/nginx/dhparam.pem 4096)
ssl_dhparam /etc/nginx/dhparam.pem;

# ── Redirect HTTP → HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name collab.lotier-immobilier.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS ───────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name collab.lotier-immobilier.com;

    # Certificats Let's Encrypt (gérés automatiquement par certbot)
    ssl_certificate     /etc/letsencrypt/live/collab.lotier-immobilier.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/collab.lotier-immobilier.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # ── En-têtes de sécurité HTTP ─────────────────────────────
    # HSTS : 2 ans, subdomains, preload (compatible hstspreload.org)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Anti-clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Empêche le MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Politique de referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Désactiver les APIs sensibles non utilisées
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

    # Isolation cross-origin (CORP + COOP)
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Masquer la version Nginx
    server_tokens off;

    # ── Proxy vers Next.js (port 3000, PM2) ───────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade              $http_upgrade;
        proxy_set_header   Connection           "upgrade";
        proxy_set_header   Host                 $host;
        proxy_set_header   X-Real-IP            $remote_addr;
        proxy_set_header   X-Forwarded-For      $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto    $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffers
        proxy_buffer_size        16k;
        proxy_buffers            4 32k;
        proxy_busy_buffers_size  64k;
    }

    # ── Cache des assets statiques Next.js ────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Uploads / pièces jointes (50 Mo max) ─────────────────
    client_max_body_size 50M;

    # ── Logs séparés pour monitoring ──────────────────────────
    access_log /var/log/nginx/collab.access.log;
    error_log  /var/log/nginx/collab.error.log warn;
}
