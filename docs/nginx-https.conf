# Configuration Nginx + HTTPS pour Collab — Lotier Immobilier
# Domaine : collab.lotier-immobilier.com
#
# ÉTAPES D'INSTALLATION SUR LE VPS :
# ──────────────────────────────────────────────────────────────
# 1. apt install nginx certbot python3-certbot-nginx -y
# 2. Copier ce fichier dans /etc/nginx/sites-available/collab
# 3. ln -s /etc/nginx/sites-available/collab /etc/nginx/sites-enabled/collab
# 4. rm /etc/nginx/sites-enabled/default  (si présent)
# 5. nginx -t && systemctl reload nginx
# 6. certbot --nginx -d collab.lotier-immobilier.com --email collab@lotier-immobilier.com --agree-tos --no-eff-email
# 7. systemctl enable certbot.timer   (renouvellement auto)
# ──────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name collab.lotier-immobilier.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name collab.lotier-immobilier.com;

    # Certificats Let's Encrypt (gérés automatiquement par certbot)
    ssl_certificate     /etc/letsencrypt/live/collab.lotier-immobilier.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/collab.lotier-immobilier.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité renforcée
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # Proxy vers Next.js (port 3000, géré par PM2)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache des assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    # Taille max des uploads (pièces jointes, images)
    client_max_body_size 50M;
}
